<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCourses - Settings</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="../shared/app.js"></script>
  <script>
    const user = requireAuth('admin');
    let settings = null;

    if (user) {
      (async () => {
        const res = await apiGet('/settings');
        settings = res.success
          ? { ...res.data.settings }
          : { allowSelfEnrollment: true, maintenanceMode: false, maxEnrollment: 60, activeSemesters: [] };
        renderSettings();
      })();
    }

    function renderSettings() {
      if (!settings) return;
      document.getElementById('app').innerHTML = `
        ${renderNavbar(user)}
        <main class="main">
          <h1 class="section-title mb-2">System Settings</h1>
          <div class="card">
            <div class="toggle-row">
              <div class="toggle-label">
                <span>Allow Self-Enrollment</span>
                <small>Students can enroll in courses themselves</small>
              </div>
              <button class="toggle ${settings.allowSelfEnrollment?'active':''}" onclick="toggleSetting('allowSelfEnrollment')"></button>
            </div>
            <div class="toggle-row">
              <div class="toggle-label">
                <span>Maintenance Mode</span>
                <small>Disable access for non-admin users</small>
              </div>
              <button class="toggle ${settings.maintenanceMode?'active':''}" onclick="toggleSetting('maintenanceMode')"></button>
            </div>
            <div style="padding:1rem 0;border-bottom:1px solid var(--border)">
              <label class="form-label">Max Enrollment per Course</label>
              <input type="number" id="maxEnroll" class="form-input" style="max-width:120px" value="${settings.maxEnrollment}" min="1">
            </div>
            <div style="padding:1rem 0">
              <label class="form-label">Active Semesters</label>
              <div class="tag-list" id="semTags">
                ${settings.activeSemesters.map(s => `<span class="tag">${s} <button onclick="removeSemester('${s}')">×</button></span>`).join('')}
              </div>
              <div class="flex items-center gap-2" style="margin-top:.75rem;gap:.5rem">
                <input type="text" id="newSem" class="form-input" placeholder="e.g. Fall 2026" style="max-width:200px">
                <button class="btn btn-outline btn-sm" onclick="addSemester()">Add</button>
              </div>
            </div>
            <div id="settingsError" class="alert-error" style="display:none;margin-top:1rem"></div>
            <button class="btn btn-primary" style="margin-top:1rem" onclick="saveSettings()">Save Settings</button>
          </div>
        </main>`;
    }

    function toggleSetting(key) {
      settings[key] = !settings[key];
      renderSettings();
    }

    function removeSemester(sem) {
      settings.activeSemesters = settings.activeSemesters.filter(x => x !== sem);
      renderSettings();
    }

    function addSemester() {
      const input = document.getElementById('newSem');
      const val = input.value.trim();
      if (!val) return;
      if (!settings.activeSemesters.includes(val)) {
        settings.activeSemesters.push(val);
      }
      renderSettings();
    }

    async function saveSettings() {
      const maxEnroll = parseInt(document.getElementById('maxEnroll').value) || 60;
      settings.maxEnrollment = maxEnroll;

      const res = await apiPut('/settings', {
        allowSelfEnrollment: settings.allowSelfEnrollment,
        maintenanceMode: settings.maintenanceMode,
        maxEnrollment: settings.maxEnrollment,
        activeSemesters: settings.activeSemesters
      });

      if (res.success) {
        settings = { ...res.data.settings };
        showToast('Settings saved!');
        renderSettings();
      } else {
        const err = document.getElementById('settingsError');
        if (err) { err.style.display = 'flex'; err.textContent = '⚠ ' + (res.message || 'Failed to save settings.'); }
      }
    }
  </script>
</body>
</html>
