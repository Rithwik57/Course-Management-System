<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCourses - Delete Course</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="../shared/app.js"></script>
  <script>
    const user = requireAuth('admin');
    if (user) {
      const courseId = getUrlParam('id');
      if (!courseId) { window.location.href = 'courses.html'; }
      else {
        (async () => {
          const res = await apiGet(`/courses/${courseId}`);
          if (!res.success) { window.location.href = 'courses.html'; return; }
          const course = res.data.course;

          document.getElementById('app').innerHTML = `
            ${renderNavbar(user)}
            <main class="main">
              <div class="confirm-wrapper">
                <div class="card">
                  <h2>Delete Course</h2>
                  <p class="warning">⚠ You are about to delete "${course.title}". This cannot be undone.</p>
                  <div id="deleteError" class="alert-error" style="display:none;margin-top:1rem"></div>
                  <div class="confirm-actions">
                    <button class="btn btn-destructive" onclick="doDelete()">Delete Course</button>
                    <a href="courses.html" class="btn btn-outline">Cancel</a>
                  </div>
                </div>
              </div>
            </main>`;
        })();
      }
    }

    async function doDelete() {
      const courseId = getUrlParam('id');
      const res = await apiDelete(`/courses/${courseId}`);
      if (res.success) {
        showToast('Course deleted.');
        setTimeout(() => window.location.href = 'courses.html', 500);
      } else {
        const err = document.getElementById('deleteError');
        if (err) { err.style.display = 'flex'; err.textContent = '⚠ ' + (res.message || 'Failed to delete course.'); }
      }
    }
  </script>
</body>
</html>
