<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCourses - Disable User</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="../shared/app.js"></script>
  <script>
    const admin = requireAuth('admin');
    if (admin) {
      const userId = getUrlParam('id');
      if (!userId) { window.location.href = 'users.html'; }
      else {
        (async () => {
          const res = await apiGet('/users');
          const target = res.success ? res.data.users.find(u => u._id === userId) : null;
          if (!target) { window.location.href = 'users.html'; return; }

          document.getElementById('app').innerHTML = `
            ${renderNavbar(admin)}
            <main class="main">
              <div class="confirm-wrapper">
                <div class="card">
                  <h2>Disable User</h2>
                  <div class="form-group" style="margin-top:1rem">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-input" value="${target.name}" disabled>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" value="${target.email}" disabled>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Role</label>
                    <input type="text" class="form-input" value="${target.role}" disabled>
                  </div>
                  <p class="warning" style="margin-top:1rem">⚠ Disabling this user will prevent them from logging in.</p>
                  <div id="editError" class="alert-error" style="display:none;margin-top:1rem"></div>
                  <div class="confirm-actions">
                    <button class="btn btn-destructive" onclick="disableUser()">Disable User</button>
                    <a href="users.html" class="btn btn-outline">Cancel</a>
                  </div>
                </div>
              </div>
            </main>`;
        })();
      }
    }

    async function disableUser() {
      const userId = getUrlParam('id');
      const res = await apiPut(`/users/${userId}`, {});
      if (res.success) {
        showToast('User disabled.');
        setTimeout(() => window.location.href = 'users.html', 500);
      } else {
        const err = document.getElementById('editError');
        if (err) { err.style.display = 'flex'; err.textContent = '⚠ ' + (res.message || 'Failed to disable user.'); }
      }
    }
  </script>
</body>
</html>
