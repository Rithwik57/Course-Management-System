<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCourses - Drop Course</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="../shared/app.js"></script>
  <script>
    const user = requireAuth('student');
    if (user) {
      const enrollmentId = getUrlParam('id');
      const courseTitle = getUrlParam('courseTitle') || 'this course';

      if (!enrollmentId) { window.location.href = 'my-courses.html'; }
      else {
        document.getElementById('app').innerHTML = `
          ${renderNavbar(user)}
          <main class="main">
            <div class="confirm-wrapper">
              <div class="card">
                <h2>Drop Course</h2>
                <p class="warning">⚠ You are about to drop "${courseTitle}". This action cannot be undone.</p>
                <div id="dropError" class="alert-error" style="display:none;margin-top:1rem"></div>
                <div class="confirm-actions">
                  <button class="btn btn-destructive" onclick="doDrop()">Yes, Drop Course</button>
                  <a href="my-courses.html" class="btn btn-outline">Cancel</a>
                </div>
              </div>
            </div>
          </main>`;
      }
    }

    async function doDrop() {
      const enrollmentId = getUrlParam('id');
      const res = await apiPut(`/enrollments/drop/${enrollmentId}`, {});
      if (res.success) {
        showToast('Course dropped.');
        setTimeout(() => window.location.href = 'my-courses.html', 500);
      } else {
        const err = document.getElementById('dropError');
        if (err) { err.style.display = 'flex'; err.textContent = '⚠ ' + (res.message || 'Failed to drop course.'); }
      }
    }
  </script>
</body>
</html>
