<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCourses - Enroll</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="../shared/app.js"></script>
  <script>
    const user = requireAuth('student');
    if (user) {
      const courseId = getUrlParam('id');
      if (!courseId) { window.location.href = 'catalog.html'; }
      else {
        (async () => {
          const res = await apiGet(`/courses/${courseId}`);
          if (!res.success) { window.location.href = 'catalog.html'; return; }
          const course = res.data.course;

          document.getElementById('app').innerHTML = `
            ${renderNavbar(user)}
            <main class="main">
              <div class="confirm-wrapper">
                <div class="card">
                  <h2>Confirm Enrollment</h2>
                  <p style="margin-top:.5rem;color:var(--muted-fg)">You are about to enroll in:</p>
                  <div class="card" style="margin-top:1rem;background:var(--secondary)">
                    <h3>${course.title}</h3>
                    <p class="text-sm text-muted">${course.semester} · ${course.enrollStatus}</p>
                    <p class="text-sm" style="margin-top:.5rem">${course.details}</p>
                  </div>
                  <div id="enrollError" class="alert-error" style="display:none;margin-top:1rem"></div>
                  <div class="confirm-actions">
                    <button class="btn btn-primary" onclick="doEnroll()">Confirm Enrollment</button>
                    <a href="catalog.html" class="btn btn-outline">Cancel</a>
                  </div>
                </div>
              </div>
            </main>`;
        })();
      }
    }

    async function doEnroll() {
      const courseId = getUrlParam('id');
      const res = await apiPost('/enrollments', { courseId });
      if (res.success) {
        showToast('Successfully enrolled!');
        setTimeout(() => window.location.href = 'my-courses.html', 500);
      } else {
        const err = document.getElementById('enrollError');
        if (err) { err.style.display = 'flex'; err.textContent = '⚠ ' + (res.message || 'Enrollment failed.'); }
      }
    }
  </script>
</body>
</html>
