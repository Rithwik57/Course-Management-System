<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCourses - Course Enrollments</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="../shared/app.js"></script>
  <script>
    const user = requireAuth('faculty');
    if (user) {
      const courseId = getUrlParam('id');
      if (!courseId) { window.location.href = 'courses.html'; }
      else {
        (async () => {
          const [courseRes, enrollRes] = await Promise.all([
            apiGet(`/courses/${courseId}`),
            apiGet(`/enrollments/course/${courseId}`)
          ]);

          if (!courseRes.success) { window.location.href = 'courses.html'; return; }
          const course = courseRes.data.course;
          const enrollments = enrollRes.success ? enrollRes.data.enrollments : [];

          document.getElementById('app').innerHTML = `
            ${renderNavbar(user)}
            <main class="main">
              <a href="courses.html" class="btn btn-outline btn-sm mb-2">← Back to Courses</a>
              <div class="card mb-2">
                <h2>${course.title}</h2>
                <p class="text-sm text-muted">${course.semester} · ${statusBadge(course.enrollStatus)}</p>
              </div>
              <div class="section-header"><h2 class="section-title">Enrolled Students (${enrollments.length})</h2></div>
              ${enrollments.length === 0
                ? '<div class="empty-state"><div class="icon">👥</div><p>No students enrolled.</p></div>'
                : `<div class="card table-wrapper"><table>
                  <thead><tr><th>Name</th><th>Email</th><th>Enrolled Date</th></tr></thead>
                  <tbody>${enrollments.map(e => {
                    const s = e.studentId;
                    const date = e.enrolledAt ? new Date(e.enrolledAt).toLocaleDateString() : 'N/A';
                    return `<tr>
                      <td>${s?.name || 'N/A'}</td>
                      <td>${s?.email || 'N/A'}</td>
                      <td>${date}</td>
                    </tr>`;
                  }).join('')}</tbody>
                </table></div>`}
            </main>`;
        })();
      }
    }
  </script>
</body>
</html>
