<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCourses - Faculty Dashboard</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="../shared/app.js"></script>
  <script>
    const user = requireAuth('faculty');
    if (user) {
      (async () => {
        const res = await apiGet('/courses/faculty/my');
        const courses = res.success ? res.data.courses : [];

        // Get enrollment counts for each course in parallel
        const countResults = await Promise.all(
          courses.map(c => apiGet(`/courses/${c._id}/enrollment-count`))
        );
        const enrollCounts = {};
        countResults.forEach((r, i) => {
          enrollCounts[String(courses[i]._id)] = r.success ? r.data.count : 0;
        });

        const totalEnrolled = Object.values(enrollCounts).reduce((sum, n) => sum + n, 0);
        const openCount = courses.filter(c => c.enrollStatus === 'Open').length;

        document.getElementById('app').innerHTML = `
          ${renderNavbar(user)}
          <main class="main">
            <div class="welcome-banner">
              <h1>Welcome, ${user.name}! 👋</h1>
              <p>Manage your courses and students</p>
            </div>
            <div class="stat-grid mb-3">
              <div class="card stat-card">
                <div class="stat-icon faculty">📚</div>
                <div><div class="stat-label">My Courses</div><div class="stat-value">${courses.length}</div></div>
              </div>
              <div class="card stat-card">
                <div class="stat-icon student">👥</div>
                <div><div class="stat-label">Enrolled Students</div><div class="stat-value">${totalEnrolled}</div></div>
              </div>
              <div class="card stat-card">
                <div class="stat-icon open">✅</div>
                <div><div class="stat-label">Open Courses</div><div class="stat-value">${openCount}</div></div>
              </div>
            </div>
            <div class="quick-actions">
              <a href="courses.html" class="btn btn-outline">📋 View All Courses</a>
            </div>
            <div class="section-header mt-3"><h2 class="section-title">Recent Courses</h2></div>
            <div class="card table-wrapper">
              <table>
                <thead><tr><th>Title</th><th>Semester</th><th>Status</th><th>Enrolled</th></tr></thead>
                <tbody>
                  ${courses.length === 0
                    ? '<tr><td colspan="4" style="text-align:center;color:var(--muted-fg)">No courses assigned yet.</td></tr>'
                    : courses.slice(0, 5).map(c => `<tr>
                      <td>${c.title}</td><td>${c.semester}</td>
                      <td>${statusBadge(c.enrollStatus)}</td>
                      <td>${enrollCounts[String(c._id)] || 0}</td>
                    </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </main>`;
      })();
    }
  </script>
</body>
</html>
